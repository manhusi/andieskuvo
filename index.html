<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Szeretettel Meghívunk</title>
    <link rel="stylesheet" href="style.css">
    <!-- Elegáns betűtípusok a meghívóhoz -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 1. Betöltő képernyő (amíg az összes 90kb-os kép le nem ér a telefonra) -->
    <div id="loading-screen" class="screen active">
        <div class="loader-content">
            <div class="heartbeat-loader"></div>
            <p id="loading-text">Meghívó előkészítése...</p>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- 2. Kezdőképernyő a gombbal (opcionális, ez indítja el az animációt zajosan is) -->
    <div id="start-screen" class="screen hidden">
        <div class="start-content">
            <p class="subtitle">Szeretettel meghívunk</p>
            <h1>Andi & Zsolti</h1>
            <p class="date">2026. május 26.</p>
            <button id="open-btn" class="elegant-btn">Meghívó kinyitása</button>
        </div>
    </div>

    <!-- 3. Az Animáció Képernyője -->
    <div id="animation-screen" class="screen hidden">
        <!-- Ide rajzoljuk ki képkockáról képkockára a videót -->
        <canvas id="invite-canvas"></canvas>
        
        <!-- Ez a rész fog megjelenni a videó után a két szélen -->
        <div id="final-content" class="final-content hidden">
            <div class="buttons-container">
                <a href="mailto:te.emailed@pelda.hu?subject=Visszajelzés:%20Esküvő%20-%20Sajnos%20nem%20tudunk%20menni&body=Kedves%20Andi%20és%20Zsolti%21%0A%0ASajnos%20nem%20tudunk%20részt%20venni%20az%20esküvőn,%20de%20nagyon%20sok%20boldogságot%20kívánunk%20Nektek%21%0A%0AÜdvözlettel:%20[Neved]" class="action-btn outline">✖</a>
                
                <a href="mailto:te.emailed@pelda.hu?subject=Visszajelzés:%20Esküvő%20-%20Ott%20leszünk!&body=Kedves%20Andi%20és%20Zsolti%21%0A%0AÖrömmel%20számolunk%20be%20róla,%20hogy%20OTT%20LESZÜNK%20az%20esküvőn%21%0A%0AÉrkezők%20nevei:%20[Ide%20írd%20a%20neveket]%0A%0AÉtelallergia%20vagy%20különleges%20kérés:%20[Ha%20nincs,%20töröld%20ki]%0A%0AVárjuk%20nagyon%21" class="action-btn">✔</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
